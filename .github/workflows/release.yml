# Build the @yawlabs/mcp single-file (Node SEA) binary on every supported
# platform and publish it to a GitHub Release. Node SEA cannot cross-compile
# (the carrier is the host `node`), so each target builds natively on its own
# runner. Distribution is via the Scoop bucket (scoop-yaw) + Homebrew tap
# (homebrew-yaw), whose package-manager fetch sets no quarantine / MotW -- so
# the unsigned (macOS: ad-hoc signed) binaries run without Gatekeeper /
# SmartScreen friction. Manifest bumps are a separate step (scripts/update-manifests.mjs).
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build + attach assets to (e.g. v0.60.4)'
        required: true

permissions:
  contents: write # create/append the GitHub Release for the tag

# Serialize runs for the same tag so an overlapping push-tag + dispatch don't
# race 10 matrix legs against one release. Queue (don't cancel) -- a half-
# uploaded release should finish, not get killed mid-asset.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,   platform: linux,  arch: x64 }
          - { runner: windows-latest,  platform: win32,  arch: x64 }
          - { runner: windows-11-arm,  platform: win32,  arch: arm64 }
          - { runner: macos-latest,    platform: darwin, arch: arm64 } # Apple Silicon
          - { runner: macos-15-intel,  platform: darwin, arch: x64 }   # macos-13 retired Dec 2025
    steps:
      # Pin to the tag, not the dispatch dropdown's ref -- otherwise a
      # workflow_dispatch builds main's tip yet attaches it to the tag's
      # release (silent wrong-commit ship). On push-tag, inputs.tag is empty
      # and this falls through to github.ref_name (the tag) unchanged. A
      # dispatch naming a nonexistent tag now fails fast here.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # esbuild + postject (build-binary.mjs) are devDeps, installed here.
      - run: npm ci

      # Native SEA build -> bin/<platform>-<arch>/<cmd>[.exe]
      # (macOS: build-binary.mjs ad-hoc codesigns after postject).
      - run: node scripts/build-binary.mjs

      # Stage as the public asset name + sha256 sidecar -> dist-release/.
      - id: stage
        run: node scripts/stage-release-asset.mjs

      # Smoke-test the freshly built binary so a broken artifact never ships.
      # --version is the one subcommand every @yawlabs CLI implements; richer
      # probes (doctor, etc.) are server-specific and don't belong in the
      # shared template.
      - name: Smoke test
        shell: bash
        run: ./dist-release/${{ steps.stage.outputs.asset }} --version

      - name: Publish to the release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist-release/${{ steps.stage.outputs.asset }}
            dist-release/${{ steps.stage.outputs.asset }}.sha256
          fail_on_unmatched_files: true

  # Publish the npm package on every v* tag. This is the SINGLE source of
  # truth for npm publication: a manual `git tag && git push --follow-tags`
  # triggers it with no workstation step, and release.sh's "hand off to CI"
  # path watches this run instead of publishing locally. Gated on `build` so a
  # broken platform binary fails the whole release before npm gets the new
  # version (npm + the GitHub Release stay in lockstep). Idempotent: a version
  # already live (e.g. an interrupted local publish) is a clean skip, so a
  # re-run never hard-fails on "cannot publish over existing version".
  publish-npm:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance (sigstore) -- repo + package are public
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      # Fail loudly if the tag and package.json disagree -- a tag pushed
      # without the matching version bump would otherwise publish whatever
      # package.json says under the tag's name.
      - name: Verify tag matches package.json
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          want="${tag#v}"
          have="$(node -p "require('./package.json').version")"
          if [ "$want" != "$have" ]; then
            echo "::error::tag ${tag} (=> ${want}) does not match package.json version ${have}"
            exit 1
          fi
          echo "tag ${tag} matches package.json ${have}"

      # Fail loudly if server.json (the MCP-registry manifest) drifts from
      # package.json. release.sh bumps both in lockstep; a manual bump that
      # touches only package.json would otherwise publish npm + the GitHub
      # Release at the new version while the MCP-registry step tries the stale
      # server.json version and 400s on "cannot publish duplicate version"
      # (exactly what happened on v0.66.0). Stop the run here instead.
      - name: Verify server.json matches package.json
        shell: bash
        run: |
          have="$(node -p "require('./package.json').version")"
          sjv="$(node -p "require('./server.json').version")"
          sjp="$(node -p "require('./server.json').packages[0].version")"
          if [ "$sjv" != "$have" ] || [ "$sjp" != "$have" ]; then
            echo "::error::server.json drift -- package.json=${have}, server.json.version=${sjv}, packages[0].version=${sjp}. Bump both with ./release.sh."
            exit 1
          fi
          echo "server.json (${sjv} / pkg ${sjp}) matches package.json ${have}"

      # prepublishOnly runs `npm run build`, so dist/ is rebuilt from the
      # checked-out tag before packing. --access public + --provenance match
      # the (public) package and emit a sigstore attestation from this run.
      - name: Publish to npm (skip if the version is already live)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ver="$(node -p "require('./package.json').version")"
          live="$(npm view "@yawlabs/mcp@${ver}" version 2>/dev/null || echo "")"
          if [ "$live" = "$ver" ]; then
            echo "@yawlabs/mcp@${ver} already on npm -- skipping publish"
            exit 0
          fi
          # The npm view above reads a registry read-replica that can lag the
          # write path: right after a near-simultaneous publish of the same
          # version (interrupted local publish racing this run, or a dispatch
          # racing a push-tag) the replica still shows it absent, so we fall
          # through and npm publish 403s with "cannot publish over ...". Treat
          # that specific conflict as success so the job is a clean no-op.
          if ! out="$(npm publish --access public --provenance 2>&1)"; then
            echo "$out"
            if echo "$out" | grep -qiE 'cannot publish over|EPUBLISHCONFLICT|previously published'; then
              echo "@yawlabs/mcp@${ver} already published (replica lag) -- treating as success"
              exit 0
            fi
            exit 1
          fi
          echo "$out"

  # Publish server.json to the official MCP registry. Previously a manual
  # `mcp-publisher publish` step, which meant the registry JWT silently expired
  # between releases. Doing it here via GitHub OIDC is tokenless (the OIDC claim
  # proves the run is in github.com/YawLabs, which owns the io.github.YawLabs/*
  # namespace) so nothing expires and the registry is never out of sync.
  # Gated on publish-npm so the registry verify (which requires the npm package
  # to be live) never races ahead of the npm publish.
  publish-registry:
    name: publish to MCP registry
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token for `mcp-publisher login github-oidc`
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      # Pin the toolchain rather than leaning on the runner image's bundled
      # Node for the `node -p` / `npm view` calls below.
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # The registry verifies the referenced npm package exists AND that its
      # package.json `mcpName` matches this server. This job `needs: publish-npm`,
      # so npm is already published by the time it runs -- the wait loop below is
      # cheap insurance against npm registry mirror/CDN propagation lag, not a
      # workstation race (server.json is the source of truth; release.sh keeps it
      # in lockstep with package.json).
      - name: Wait for the npm package to be live
        shell: bash
        run: |
          ver=$(node -p "require('./server.json').version")
          for i in $(seq 1 30); do
            if [ "$(npm view "@yawlabs/mcp@${ver}" version 2>/dev/null)" = "$ver" ]; then
              echo "npm has @yawlabs/mcp@${ver}"; exit 0
            fi
            echo "waiting for npm @yawlabs/mcp@${ver} (${i}/30)..."; sleep 10
          done
          echo "::error::npm did not show @yawlabs/mcp@${ver} within 5 minutes"; exit 1

      # mcp-publisher is a Go binary distributed via the registry's releases.
      # Pinned to a specific tag (not the mutable `latest`) and verified against
      # the published sha256 BEFORE execution: this runner holds id-token: write
      # for the io.github.YawLabs/* namespace, so a piped `curl | tar` of a
      # compromised or mis-published upstream build would run with that scope.
      # Bump MCP_PUBLISHER_VERSION + _SHA256 together, deliberately, like any
      # other pinned dependency (sha256 is in registry_<ver>_checksums.txt on
      # the release).
      - name: Install mcp-publisher
        shell: bash
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          tarball="mcp-publisher_linux_amd64.tar.gz"
          curl -fsSL -o "$tarball" \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${tarball}"
          echo "${MCP_PUBLISHER_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" mcp-publisher
          rm -f "$tarball"
          ./mcp-publisher --help >/dev/null

      - name: Publish server.json (GitHub OIDC)
        shell: bash
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
